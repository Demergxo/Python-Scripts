<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename='css/bootstrap.css') }}" rel="stylesheet"/>

</head>

                <div class="col-6">

                    </div>
                </div>
                <div class="col-6">
                    <div class="row">
                        <div class="col-6">

                        </div>

                    </div>

                </div>
            </div>
        </div>

    </section>
