apiVersion: batch/v1
kind: Job
metadata:
  name: job-migrate
  namespace: MSM
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: 192.168.100.100:5000/msm:latest
        command: ['sh', '-c', 'python manage.py migrate']
        envFrom:
        - secretRef:
            name: app-secret
        - configMapRef:
            name: app-config
      